name: Frontend CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '../../frontend'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches:
      - main
    paths:
      - '../../frontend'
      - '.github/workflows/frontend-ci.yml'

jobs:
  validate-frontend:
    name: Validate Frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    env:
      CI: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Run linting
        run: npm run lint

      - name: Run tests
        run: npm run test:ci

      - name: Build frontend
        run: npm run build

      - name: Run security audit
        run: npm run audit
